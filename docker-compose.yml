version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rssight-backend
    restart: unless-stopped
    ports:
      - "8173:8000"
    volumes:
      - rssight-data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - WEBRSS_DEBUG=${WEBRSS_DEBUG:-0}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - rssight-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rssight-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rssight-network

volumes:
  rssight-data:
    driver: local

networks:
  rssight-network:
    driver: bridge
