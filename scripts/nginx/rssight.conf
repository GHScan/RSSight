# RSSight nginx Configuration Template
#
# This is a sample nginx configuration for RSSight deployment.
# Copy this file to /etc/nginx/sites-available/ and create a symlink to sites-enabled/.
#
# Install:
#   sudo cp rssight.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/rssight.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - RSSight backend running on port 8173 (adjust upstream if different)
#   - Frontend built to /opt/rssight/frontend/dist (adjust root if different)
#   - Replace 'your-domain.com' with your actual domain or server IP

# Upstream for backend API
upstream rssight_backend {
    server 127.0.0.1:8173;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # Replace with your domain or IP

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # API proxy
    location /api/ {
        proxy_pass http://rssight_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # WebSocket support (for future real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint
    location /healthz {
        proxy_pass http://rssight_backend/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;  # Don't log health checks
    }

    # Static frontend (production)
    root /opt/rssight/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

