# GitHub Actions CI workflow for RSSight
# Runs quality gates on every push and pull request.
# Primary platform: ubuntu-latest (Linux)

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff (lint)
        working-directory: backend
        run: python -m ruff check app tests

      - name: Run black (format check)
        working-directory: backend
        run: python -m black --check app tests

      - name: Run mypy (type check)
        working-directory: backend
        run: python -m mypy app

      - name: Run pytest (unit tests)
        working-directory: backend
        run: python -m pytest -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: frontend
        run: npm run typecheck

      - name: Run vitest (UI tests)
        working-directory: frontend
        run: npm run test:ui

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run test:e2e
